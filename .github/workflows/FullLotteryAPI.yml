name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "3 10 * * *"
    - cron: "17 10 * * *"
    - cron: "29 10 * * *"
    - cron: "44 10 * * *"
    - cron: "56 10 * * *"
    - cron: "8 11 * * *"
    - cron: "22 11 * * *"
    - cron: "37 11 * * *"
    - cron: "51 11 * * *"
    - cron: "6 12 * * *"
    - cron: "19 12 * * *"
    - cron: "33 12 * * *"
    - cron: "47 12 * * *"
    - cron: "59 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install telethon
      - name: Restore session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi
      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py
      - name: Force push (manual) or normal push (auto)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git add -f lottery_data_api.html
          [ -f .last_clean_date ] && git add -f .last_clean_date
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动模式：强制推送覆盖远程文件"
            git commit -m "force update lottery data $(date -u)" || git commit --allow-empty -m "force sync"
            git push --force origin $BRANCH
          else
            echo "自动模式：正常推送"
            if ! git diff --cached --quiet; then
              git commit -m "auto update lottery data"
              git pull --rebase origin $BRANCH
              git push origin $BRANCH
            else
              echo "无变化，跳过提交"
            fi
          fi
