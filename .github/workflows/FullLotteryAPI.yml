name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "3 10 * * *"
    - cron: "17 10 * * *"
    - cron: "29 10 * * *"
    - cron: "44 10 * * *"
    - cron: "56 10 * * *"
    - cron: "8 11 * * *"
    - cron: "22 11 * * *"
    - cron: "37 11 * * *"
    - cron: "51 11 * * *"
    - cron: "6 12 * * *"
    - cron: "19 12 * * *"
    - cron: "33 12 * * *"
    - cron: "47 12 * * *"
    - cron: "59 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install telethon

      - name: Restore session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py

      # 👇 下面这段是修好的【真正能保存文件】的代码
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html
          git add .last_clean_date
          git commit -m "Update lottery data" || true
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
