name: FullLotteryAPI

on:
  workflow_dispatch:   # 允许手动触发和外部 API 触发

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run main script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html
          if [ -f .last_clean_date ]; then git add .last_clean_date; fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git commit -m "manual update: force replace" || true
            git push --force origin HEAD:main
          else
            git diff --cached --quiet || git commit -m "auto update lottery data"
            git pull --rebase origin main
            git push
          fi
