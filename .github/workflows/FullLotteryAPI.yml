name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "3 10 * * *"
    - cron: "17 10 * * *"
    - cron: "29 10 * * *"
    - cron: "44 10 * * *"
    - cron: "56 10 * * *"
    - cron: "8 11 * * *"
    - cron: "22 11 * * *"
    - cron: "37 11 * * *"
    - cron: "51 11 * * *"
    - cron: "6 12 * * *"
    - cron: "19 12 * * *"
    - cron: "33 12 * * *"
    - cron: "47 12 * * *"
    - cron: "59 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install telethon
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          echo "$SESSION_BASE64" | base64 -d > session.session

      - name: Run main script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py

      - name: Force push to remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 自动获取当前分支名（兼容 main 或 master）
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "当前分支: $BRANCH"
          
          # 强制添加文件
          git add --force lottery_data_api.html
          git add .last_clean_date 2>/dev/null || true
          
          # 提交（允许空提交，确保总有新提交）
          git commit -m "FORCE UPDATE: $(date -u)" --allow-empty
          
          # 使用 GITHUB_TOKEN 强制推送
          git push --force https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:$BRANCH
          
          echo "✅ 强制推送完成，远程文件已更新"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
