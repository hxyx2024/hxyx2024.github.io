name: Full Lottery API

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Run main program
        run: python main.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html .used_periods.json .last_clean_date_main
          git diff --quiet && git diff --staged --quiet || git commit -m "Update lottery data [skip ci]"
          git pull origin main --rebase
          git push
