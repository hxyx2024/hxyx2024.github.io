name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 10-13 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install telethon

      - name: Restore session from base64
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py

      - name: Push changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add lottery_data_api.html .fetched_periods.txt
          git diff --cached --quiet || git commit -m "update lottery data"
          git push
