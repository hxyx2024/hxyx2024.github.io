name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "3 10 * * *"
    - cron: "17 10 * * *"
    - cron: "29 10 * * *"
    - cron: "44 10 * * *"
    - cron: "56 10 * * *"
    - cron: "8 11 * * *"
    - cron: "22 11 * * *"
    - cron: "37 11 * * *"
    - cron: "51 11 * * *"
    - cron: "6 12 * * *"
    - cron: "19 12 * * *"
    - cron: "33 12 * * *"
    - cron: "47 12 * * *"
    - cron: "59 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，避免强制推送问题

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run main script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py

      - name: Commit and push changes (force for manual)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Current branch: $BRANCH"
          
          # 添加文件
          git add lottery_data_api.html
          [ -f .last_clean_date ] && git add .last_clean_date
          
          # 判断是否手动触发
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发：强制推送更新"
            # 强制提交（允许空提交也可以，但为了确保覆盖，直接 commit 并 force push）
            git commit -m "force update lottery data (manual run)" || echo "No changes to commit, but forcing push anyway"
            # 强制推送（使用 --force-with-lease 更安全）
            git push --force-with-lease origin $BRANCH
          else
            echo "自动触发：正常推送"
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "update lottery data (auto)"
              git pull --rebase origin $BRANCH
              git push origin $BRANCH
            fi
          fi
