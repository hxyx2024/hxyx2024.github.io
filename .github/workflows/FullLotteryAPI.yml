name: FullLotteryAPI

on:
  schedule:
    - cron: '0 18-21 * * *'   # 北京时间 2:00-5:00 对应 UTC 18-21点，可根据需要调整
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Run lottery bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python lottery_bot.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html .last_clean_date
          git diff --quiet && git diff --staged --quiet || git commit -m "Update lottery data [skip ci]"
          git push
