name: Collect Last 60 Te Codes

on:
  schedule:
    - cron: '*/59 * * * *'   # 每分钟运行一次，可根据需要调整
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session_ga.session
          fi

      - name: Run collection script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python collect_te.py   # 请确保脚本文件名与仓库中的一致

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add antdata.html antdata_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update latest 60 te codes [skip ci]"
          git pull --rebase origin main
          git push
