version: '3'

services:
  lottery:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    command:
      - /bin/sh
      - -c
      - |
        pip install telethon
        python main.py
    environment:
      - TZ=Asia/Shanghai
    tty: true
    stdin_open: true
    restart: always
