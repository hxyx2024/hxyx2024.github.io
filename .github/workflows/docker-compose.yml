version: '3'
services:
  bot:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    command:
      - /bin/sh
      - -c
      - |
        pip install telethon pysocks
        python main.py
    environment:
      - TZ=Asia/Shanghai
    tty: true
    stdin_open: true
    network_mode: host
