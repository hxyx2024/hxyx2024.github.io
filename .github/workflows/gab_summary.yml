name: Collect GA/GB and Rules

on:
  schedule:
    - cron: '*/59 * * * *'   # 每分钟运行一次（可根据需要调整）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run unified collection script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python gab_summary.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gab_summary.html default_rules.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GA/GB summary and default rules [skip ci]"
          git pull --rebase origin main
          git push
