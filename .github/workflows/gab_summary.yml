name: Generate GA/GB Summary

on:
  schedule:
    - cron: '0 * * * *'   # 每小时运行一次（可根据需要修改）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Restore session file from secret
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
            echo "Session file restored."
          else
            echo "No session secret found, will attempt interactive login (will fail)."
          fi

      - name: Run summary script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python gab_summary.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gab_summary.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GA/GB summary [skip ci]"
          git pull --rebase origin main
          git push
