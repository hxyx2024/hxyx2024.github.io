name: LaoAo Main Program

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run main
        run: python laoao_main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add laoao_lottery_data.html .last_clean_date_main_laoao
          git diff --quiet && git diff --staged --quiet || git commit -m "Update LaoAo lottery data [skip ci]"
          git pull origin main --rebase
          git push
