name: Lottery Data Fetcher

on:
  schedule:
    # 每10分钟运行一次（北京时间 18:00-21:20 对应 UTC 10:00-13:20）
    # 为了覆盖整个时段，设置从 UTC 10:00 到 13:20 的每10分钟触发
    - cron: '*/10 10-13 * * *'
    # 确保 13:20 之后停止，但 cron 无法精确到 20 分，所以多几次也无妨，代码会自己判断时间
  workflow_dispatch:   # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Telethon session
        uses: actions/cache@v4
        with:
          path: session.session
          key: telethon-session-${{ runner.os }}-${{ hashFiles('session.session') }}
          restore-keys: |
            telethon-session-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon

      - name: Run lottery script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python lottery.py   # 请将脚本文件名改为实际文件名
