name: FullLotteryAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "3 10 * * *"    # 北京时间 18:03
    - cron: "17 10 * * *"   # 北京时间 18:17
    - cron: "29 10 * * *"   # 北京时间 18:29
    - cron: "44 10 * * *"   # 北京时间 18:44
    - cron: "56 10 * * *"   # 北京时间 18:56
    - cron: "8 11 * * *"    # 北京时间 19:08
    - cron: "22 11 * * *"   # 北京时间 19:22
    - cron: "37 11 * * *"   # 北京时间 19:37
    - cron: "51 11 * * *"   # 北京时间 19:51
    - cron: "6 12 * * *"    # 北京时间 20:06
    - cron: "19 12 * * *"   # 北京时间 20:19
    - cron: "33 12 * * *"   # 北京时间 20:33
    - cron: "47 12 * * *"   # 北京时间 20:47
    - cron: "59 12 * * *"   # 北京时间 20:59

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install telethon

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > session.session
          fi

      - name: Run main script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html
          if [ -f .last_clean_date ]; then git add .last_clean_date; fi
          # 注意：不再使用 last_msg_id.json，所以不需要添加
          git diff --cached --quiet || git commit -m "update lottery data"
          git pull --rebase origin main
          git push
