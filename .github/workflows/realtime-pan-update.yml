name: RealTimeDataUpdate

on:
  schedule:
    - cron: '0 10 * * *'   # 北京时间 18:00
    - cron: '0 12 * * *'   # 北京时间 20:00
    - cron: '59 12 * * *'  # 北京时间 20:59
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - run: |
          cp -f rules/xinao_pan1.html ./lottery_data_api.html
          cp -f rules/xinao_pan2.html ./lottery_data_api.html
          cp -f rules/xinao_pan3.html ./lottery_data_api.html

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data_api.html
          git commit -m "Auto update realtime data" || exit 0
          git push
