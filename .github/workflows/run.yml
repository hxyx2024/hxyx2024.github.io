name: Run
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install telethon
      - run: python main.py
      - name: Save
        run: |
          git config user.name bot
          git config user.email bot@github.com
          git add .
          git commit -m update
          git push
