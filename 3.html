<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=1.0, viewport-fit=cover">
    <title>Ant Data AI Stats Tool · 专业版</title>
    <style>
        /* ========== 基础样式 ========== */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body { width:100%; min-height:100vh; background:#121212; color:#eee; padding:6px; }
        .container { max-width:700px; margin:0 auto; overflow-x:hidden; }
        .tool-box { background:#1a1a1a; padding:12px 10px; border-radius:16px; border:1px solid #2a2a2a; }
        h1 { text-align:center; font-size:20px; margin-bottom:12px; color:#fff; }
        .panel { margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #222; }
        .panel:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
        .panel-title { font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .panel-title-left { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .sub-group { background:#1e1e1e; border-radius:12px; padding:10px; margin-bottom:12px; border-left:3px solid #007bff; }
        .sub-group:last-child { margin-bottom:0; }
        .sub-title { font-size:15px; font-weight:bold; margin-bottom:8px; color:#fff; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
        .ant-clickable { cursor:pointer; display:inline-block; transition:transform 0.1s ease; user-select:none; }
        .ant-clickable:active { transform:scale(0.96); }
        #inputAreaWrapper { display:none; transition:opacity 0.2s; }
        textarea { width:100%; height:70px; padding:8px; border:none; border-radius:8px; font-size:14px; background:#222; color:#eee; outline:none; resize:vertical; max-height:120px; }
        .input-info { font-size:12px; color:#888; margin-top:4px; }
        .btn-group { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
        button, .btn-link { flex:1; min-width:60px; padding:10px 4px; border:none; border-radius:8px; background:#252525; color:#eee; font-size:13px; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-height:44px; line-height:1.2; }
        button:disabled, .btn-link.disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; filter:grayscale(0.1); }
        .btn-link { background:#252525; color:#eee; }
        .btn-link:hover { background:#3a3a3a; }
        button:active, .btn-link:active { opacity:0.7; transform:scale(0.96); }
        button.primary { background:#007bff; color:#fff; }
        .result-section { margin-top:8px; padding:8px; border-radius:12px; background:#222; }
        .result-title { font-size:15px; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
        .stats-two-columns { display:flex; gap:16px; flex-wrap:wrap; }
        .stats-column { flex:1; min-width:0; }
        .stats-column .stat-header { font-size:13px; font-weight:bold; color:#007bff; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #333; }
        .thank-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:6px 0; border-bottom:1px solid #333; gap:12px; flex-wrap:wrap; }
        .marquee-container { flex:1; overflow:hidden; text-align:center; }
        .marquee { white-space:nowrap; display:inline-block; animation:marquee 15s linear infinite; padding-left:100%; color:#f97316; }
        @keyframes marquee { 0% { transform:translateX(0); } 100% { transform:translateX(-100%); } }
        .period-text { font-size:14px; font-weight:bold; color:#007bff; white-space:nowrap; background:#252525; padding:4px 12px; border-radius:40px; }
        .base-row { display:flex; gap:12px; font-size:13px; flex-wrap:wrap; align-items:center; }
        .group-item { padding:8px 10px; margin:4px 0; background:#252525; font-size:13px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; width:100%; word-break:break-word; overflow-wrap:break-word; border-left:2px solid #007bff; flex-wrap:wrap; gap:8px; }
        .copy-btn { padding:4px 8px; background:#333; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; }
        .copy-tip { color:#6cce6c; font-size:12px; margin-left:6px; }
        .compare-row { background:#252525; border-left:2px solid #007bff; }
        .final-row { background:#252525; border-left:2px solid #007bff; }
        .final-row .title-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .datetime { font-size:12px; color:#aaa; }
        .rule-row, .custom-rule-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; background:#252525; padding:6px 10px; border-radius:10px; position:relative; flex-wrap:wrap; }
        .rule-row .rule-index, .custom-rule-row .rule-index { width:36px; text-align:center; font-weight:bold; color:#007bff; font-size:14px; }
        .rule-row input, .custom-rule-row input { flex:1; background:#1e1e1e; border:1px solid #3a3a3a; border-radius:8px; padding:10px 6px; color:#eee; font-size:14px; text-align:center; min-width:80px; }
        .del-rule-btn { position:absolute; right:0px; top:-8px; background:transparent; border:none; color:#aaa; font-size:12px; cursor:pointer; padding:0; line-height:1; font-weight:bold; z-index:5; }
        .rule-inputs-container { margin-top:12px; display:none; }
        .switch-control input { width:36px; height:20px; appearance:none; background:#333; border-radius:20px; position:relative; cursor:pointer; }
        .switch-control input:checked { background:#007bff; }
        .switch-control input::after { content:''; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; position:absolute; transition:0.2s; }
        .switch-control input:checked::after { left:18px; }
        .switch-control { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#888; }
        .rule-import-box { margin:10px 0; display:flex; gap:8px; align-items:stretch; }
        .rule-import-input { flex:1; min-height:100px; padding:8px; border-radius:8px; background:#222; color:#eee; font-size:14px; border:none; resize:vertical; }
        .rule-stats { font-size:14px; font-weight:500; color:#007bff; background:#252525; padding:5px 12px; border-radius:40px; line-height:1.2; white-space:nowrap; }
        .button-row-right { display:flex; justify-content:flex-end; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
        .btn-small { background:#252525; border:none; padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; color:#eee; transition:0.2s; }
        .rule-container { background:#0d0d0d; border-radius:14px; padding:12px; margin:12px 0; display:flex; flex-wrap:wrap; gap:8px; border:1px solid #2c2c2c; }
        .ab-line { margin:2px 0; padding:4px 10px; line-height:1.4; border-radius:20px; cursor:pointer; display:inline-block; font-size:12px; transition:0.2s; }
        .ab-line:hover { transform:scale(1.02); filter:brightness(1.1); background:#3a3a3a; }
        .rule-hot { background:#2a1a1a; color:#f97316; border-left:3px solid #f97316; }
        .rule-warm { background:#2a2a1a; color:#facc15; border-left:3px solid #facc15; }
        .rule-cold { background:#1a2a3a; color:#60a5fa; border-left:3px solid #60a5fa; }
        .ab-sequence { background:#0d0d0d; border-radius:14px; padding:12px; margin-top:10px; font-family:monospace; font-size:12px; max-height:260px; overflow-y:auto; border:1px solid #2c2c2c; }
        .period-input-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:nowrap; overflow-x:auto; }
        .period-input-row input { background:#222; border:none; border-radius:40px; padding:8px 12px; color:#eee; font-size:14px; width:70px; text-align:center; }
        .period-input-row select { background:#222; border:none; border-radius:40px; padding:8px 12px; color:#eee; font-size:14px; cursor:pointer; }
        .edit-rule-row { margin-top:12px; margin-bottom:12px; padding:10px; background:#1a1a1a; border-radius:12px; border:1px solid #2c2c2c; }
        .edit-input { width:100%; background:#0d0d0d; border:1px solid #2c2c2c; border-radius:40px; padding:10px 12px; color:#e0e0e0; font-size:13px; font-family:monospace; }
        .hit-rate-display { margin:10px 0; padding:8px; background:#252525; border-radius:8px; text-align:center; font-size:14px; }
        .footer { text-align:center; margin-top:16px; font-size:11px; color:#666; }
        .reason { display:flex; align-items:center; justify-content:center; font-size:12px; color:#888; margin-top:8px; }
        /* 授权卡片样式（无背景框、融入data区）*/
        .auth-card {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .auth-card .device-code {
            font-family: monospace;
            background: #0d0d0d;
            padding: 4px 12px;
            border-radius: 30px;
            color: #facc15;
            font-size: 11px;
            word-break: break-all;
            cursor: pointer;
        }
        .auth-card input {
            background: #0d0d0d;
            border: 1px solid #2c2c2c;
            border-radius: 8px;
            padding: 6px 12px;
            color: #eee;
            font-size: 12px;
            width: 140px;
        }
        .auth-card button {
            background: #252525;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            color: #eee;
            font-size: 13px;
            cursor: pointer;
        }
        .auth-card .auth-tip { color: #aaa; font-size: 11px; margin-left: 6px; }
        /* 禁用开关组 */
        .disabled-panel input, .disabled-panel select, .disabled-panel textarea, .disabled-panel button:not(.auth-card button) { opacity:0.5; pointer-events:none; }
        @media (max-width:600px) {
            body { padding:4px; } .tool-box { padding:8px; }
            .auth-card input { width: 110px; }
        }
    </style>
</head>
<body>

<!-- 主界面，全局模态框已彻底移除 -->
<div class="container">

            <div id="group1Content">

                <div class="btn-group"><button onclick="resetRules()" id="resetRulesBtn">🔄 restore</button><a href="https://xm2026.github.io/i.html" target="_blank" class="btn-link" id="linkToolBtn">🧰 工具</a><button onclick="clearAllRules()" id="clearAllRulesBtn">🗑 A-B</button><button id="addCustomRuleBtn">➕ ADD</button></div>
                <div class="rule-inputs-container" id="ruleInputsContainer">

<script>
    // ==================== 授权核心 (无模态框，卡片版) ====================
    const WORKER_URL = 'https://api.mycm.cc.cd';
    const STORAGE_KEY = "ANT_AUTH";
    const DEVICE_UUID_KEY = "ANT_DEVICE_UUID";
    function getDeviceUUID() {
        let uuid = localStorage.getItem(DEVICE_UUID_KEY);
        if (!uuid) { uuid = crypto.randomUUID ? crypto.randomUUID() : 'xxxx-4xxx-yxxx'.replace(/[xy]/g, c=>{let r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}); localStorage.setItem(DEVICE_UUID_KEY,uuid); }
        return uuid;
    }
    async function fetchWithTimeout(url, options = {}, timeout = 10000) {
        const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout);
        try { const resp = await fetch(url, { ...options, signal: controller.signal }); clearTimeout(id); return resp; } catch(e) { clearTimeout(id); throw e; }
    }
    async function verifyAuthWithWorker(authCode) {
        const deviceCode = getDeviceUUID(); if (!deviceCode || !authCode) return false;
        try { const resp = await fetchWithTimeout(`${WORKER_URL}/verify`, { method: 'GET', headers: { 'X-Device-Code': deviceCode, 'X-Auth-Code': authCode } }, 10000); const data = await resp.json(); return data.valid === true; } catch(err) { console.error(err); return false; }
    }
    function saveAuthCode(authCode) { localStorage.setItem(STORAGE_KEY, authCode); }
    function clearAuth() { localStorage.removeItem(STORAGE_KEY); }

    // ---------- 授权控制: 所有面板的开关/按钮统一启用/禁用 ----------
    function setCardSwitchesEnabled(enabled) {
        const switchesIds = ['globalStatSwitch', 'rangeSwitch', 'selectRangeSwitch', 'matchSwitch'];
        switchesIds.forEach(id => { let el = document.getElementById(id); if(el) { el.disabled = !enabled; if(!enabled) el.style.pointerEvents = 'none'; else el.style.pointerEvents = ''; } });
        // 核心异步按钮
        const btns = ['autoSyncBtn', 'onlineCollectRangeBtn', 'importRulesFromRangeBtn', 'openVipBtn', 'openPmBtn', 'refreshSelectRulesBtn', 'importSelectHotBtn', 'importSelectWarmBtn', 'importSelectColdBtn', 'resetRulesBtn', 'clearAllRulesBtn', 'addCustomRuleBtn'];
        btns.forEach(id => { let btn = document.getElementById(id); if(btn) btn.disabled = !enabled; });
        // 规则文本域/导入框禁用
        let rangeTextarea = document.getElementById('rangeData'); if(rangeTextarea) rangeTextarea.disabled = !enabled;
        let ruleImportText = document.getElementById('ruleImportText'); if(ruleImportText) ruleImportText.disabled = !enabled;
        // 自选规则区域所有静态输入框只读/禁用（保持视觉）
        for(let i=1;i<=5;i++){ let a=document.getElementById(`rule${i}a`); let b=document.getElementById(`rule${i}b`); if(a) a.disabled = !enabled; if(b) b.disabled = !enabled; }
        if(window.enableCustomRuleInputs) window.enableCustomRuleInputs(enabled);
        // 组数输入/模式下拉禁用
        let periodInp = document.getElementById('selectPeriodInput'); if(periodInp) periodInp.disabled = !enabled;
        let modeSelect = document.getElementById('coldModeSelect'); if(modeSelect) modeSelect.disabled = !enabled;
        // 蚂蚁图标点击保护（添加额外保护）
        if(!enabled) { document.getElementById('antIcon')?.setAttribute('data-auth-lock', 'true'); } else { document.getElementById('antIcon')?.removeAttribute('data-auth-lock'); }
    }
    function enableCustomRuleInputs(enable){ 
        let container = document.getElementById('customRuleContainer'); if(container){ let inputs = container.querySelectorAll('input'); inputs.forEach(inp=> inp.disabled = !enable); }
    }
    window.enableCustomRuleInputs = enableCustomRuleInputs;
    // 全局检查授权拦截器（为重要功能提供二次防护）
    function isAuthorizedSync(){ return !!localStorage.getItem(STORAGE_KEY); }
    async function requireAuthAndPerform(actionName, callback) { let code = localStorage.getItem(STORAGE_KEY); if(!code){ showToast('请先完成授权验证'); return false; } let valid=await verifyAuthWithWorker(code); if(valid){ await callback(); return true;} else { clearAuth(); setCardSwitchesEnabled(false); showToast('授权失效，请重新验证'); document.getElementById('authCardCode').value = ''; document.getElementById('authCardTip').textContent = '授权失效'; return false; } }

    // ==================== 原有核心函数（保留全部逻辑，仅植入授权钩子） ====================
    const state = { countData:{1:{},2:{}}, minMax:{1:{min:0,max:0},2:{min:0,max:0}}, groupLines:{1:'',2:''}, timers:{}, customRules:[] };
    const utils = { padZero:n=>n.toString().padStart(2,'0'), getZodiac:n=>['马','蛇','龙','兔','虎','牛','鼠','猪','狗','鸡','猴','羊'][(n-1)%12], uniqueSort:arr=>[...new Set(arr)].sort((a,b)=>a-b), formatNumbers:arr=>utils.uniqueSort(arr).map(utils.padZero).join(' ')||'无', parseNumbers:str=>(str.match(/\d+/g)||[]).map(Number).filter(n=>n>=1&&n<=49), shuffleArray:arr=>{let a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;} };
    let showRulesDetail = false;
    function showToast(msg){ let d=document.createElement('div'); d.textContent=msg; d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:10000;white-space:nowrap;'; document.body.appendChild(d); setTimeout(()=>d.remove(),1500); }
    function copyToClipboard(text,tipId){ if(!text||!text.trim()) return false; navigator.clipboard.writeText(text).then(()=>{if(tipId){let t=document.getElementById(tipId);if(t)t.innerText='✅ 已复制';setTimeout(()=>{if(t)t.innerText='';},1500);}}).catch(()=>{alert('手动复制失败');}); return true;}
    function getCurrentDateTime(){ let n=new Date(); return `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][n.getDay()]} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`; }
    async function loadMarqueeText(){ try{ let r=await fetch('ptz.txt?t='+Date.now()); if(r.ok){let t=await r.text(); document.getElementById('marqueeText').textContent=t.trim()||'蚂蚁数据-专注澳彩';} }catch(e){} }
    function rangeToNumbers(r){ r=r.trim(); if(!r||r==='-')return[]; let n=r.replace(/[～~－]/g,'-'); let m=n.match(/^(\d+)-(\d+)$/); if(m){ let s=parseInt(m[1]),e=parseInt(m[2]); if(!isNaN(s)&&!isNaN(e)&&s<=e){ let a=[]; for(let i=s;i<=e;i++)a.push(i); return a; } } if(r.includes(',')) return r.split(',').map(x=>parseInt(x,10)).filter(x=>!isNaN(x)); let num=parseInt(r); return isNaN(num)?[]:[num]; }
    function ruleContains(ruleVal,val){ return rangeToNumbers(ruleVal).includes(val); }
    function matchRule(val,rule){ rule=(rule||'').trim().replace(/~/g,'-'); if(!rule)return true; if(rule.includes('-')){ let[a,b]=rule.split('-').map(Number); return val>=Math.min(a,b)&&val<=Math.max(a,b); } return val==Number(rule); }
    function parseRuleLine(line){ line=line.trim(); if(!line)return null; let arrow=line.match(/(.+?)(?:→|➔|=>|->)(.+)/); if(arrow)return {a:arrow[1].trim(),b:arrow[2].trim()}; let parts=line.split(/\s+/); if(parts.length>=2)return {a:parts[0],b:parts[1]}; return null; }
    function fillRuleToSlots(aVal,bVal){ for(let i=1;i<=5;i++){ let aEl=document.getElementById(`rule${i}a`),bEl=document.getElementById(`rule${i}b`); if(aEl&&bEl&&(!aEl.value.trim()||!bEl.value.trim())){ aEl.value=aVal; bEl.value=bVal; onRuleChange(); return true; } } state.customRules.push({a:aVal,b:bVal}); renderCustomRules(); onRuleChange(); return true; }
    function renderCustomRules(){ let container=document.getElementById('customRuleContainer'); let html=''; state.customRules.forEach((rule,index)=>{ html+=`<div class="custom-rule-row"><div class="rule-index">${6+index}</div><input type="text" class="rule-input-a" value="${escapeHtml(rule.a)}" oninput="updateCustomRule(${index},'a',this.value)"><input type="text" class="rule-input-b" value="${escapeHtml(rule.b)}" oninput="updateCustomRule(${index},'b',this.value)"><button class="del-rule-btn" onclick="deleteCustomRule(${index})">✖</button></div>`; }); container.innerHTML=html; let authorized=!!localStorage.getItem(STORAGE_KEY); if(!authorized) enableCustomRuleInputs(false); }
    function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }
    function deleteCustomRule(idx){ state.customRules.splice(idx,1); renderCustomRules(); onRuleChange(); }
    function updateCustomRule(idx,key,val){ if(state.customRules[idx]){ state.customRules[idx][key]=val.trim(); onRuleChange(); } }
    function onRuleChange(){ clearTimeout(state.timers.ruleChange); state.timers.ruleChange=setTimeout(compareAll,200); }
    function syncRules(){ let m1=state.minMax[1].max||0,m2=state.minMax[2].max||0; let def=[{a:'0-2',b:'0-2'},{a:'2-2',b:'1-4'},{a:'3-5',b:'2-6'},{a:'6-6',b:'2-6'},{a:`7-${m1}`,b:`3-${m2}`}]; for(let i=1;i<=5;i++){ document.getElementById(`rule${i}a`).value=def[i-1].a; document.getElementById(`rule${i}b`).value=def[i-1].b; } state.customRules=[]; renderCustomRules(); compareAll(); }
    function resetRules(){ syncRules(); }
    function clearAllRules(){ for(let i=1;i<=5;i++){ document.getElementById(`rule${i}a`).value=''; document.getElementById(`rule${i}b`).value=''; } state.customRules=[]; renderCustomRules(); compareAll(); }
    function compareAll(){ /* 原有统计逻辑不变，仅保留功能 */ let rules=[]; for(let i=1;i<=5;i++)rules.push({a:document.getElementById(`rule${i}a`).value.trim(),b:document.getElementById(`rule${i}b`).value.trim()}); let allRules=[...rules,...state.customRules].filter(r=>r.a&&r.b); let rangeText=document.getElementById('rangeData').value.trim(); let lines=rangeText?rangeText.split('\n').filter(l=>l.trim()):[]; let gaNums=utils.parseNumbers(document.getElementById('numInput1').value),gbNums=utils.parseNumbers(document.getElementById('numInput2').value); if(gaNums.length===0||gbNums.length===0){ document.getElementById('compareResult').innerHTML='<div class="result-title">等待数据...</div>'; return; } let allCombosSet=new Set(),hitCombosSet=new Set(); for(let line of lines){ let parsed=parseRuleLine(line); if(!parsed||!parsed.a||!parsed.b)continue; let aVals=rangeToNumbers(parsed.a),bVals=rangeToNumbers(parsed.b); for(let a of aVals)for(let b of bVals){ let key=`${a},${b}`; allCombosSet.add(key); let matched=false; for(let rule of allRules)if(ruleContains(rule.a,a)&&ruleContains(rule.b,b)){matched=true;break;} if(matched)hitCombosSet.add(key); } } let totalCombos=allCombosSet.size,hitCombos=hitCombosSet.size; let overall=totalCombos>0?`中奖概率：${hitCombos} / ${totalCombos} = ${((hitCombos/totalCombos)*100).toFixed(2)}%`:'组合命中率：0%'; let allNumbers=Array.from({length:49},(_,i)=>i+1); let results=[],texts=[]; allRules.forEach(r=>{ let set=new Set(); allNumbers.forEach(n=>{ if(matchRule(state.countData[1][n],r.a)&&matchRule(state.countData[2][n],r.b)) set.add(n); }); results.push(Array.from(set).sort((a,b)=>a-b)); texts.push(`${r.a} → ${r.b}`); }); let finalSet=new Set(); results.forEach(res=>res.forEach(n=>finalSet.add(n))); let final=Array.from(finalSet).sort((a,b)=>a-b); let resultHtml=`<div class="result-title"><span>🔵 统计结果</span><label class="switch-control">Memo book<input type="checkbox" id="noteSwitch" onchange="toggleNote()"></label></div><div><textarea id="noteTextarea" class="note-textarea" style="display:none;" placeholder="备注..."></textarea>${overall}<div class="group-item final-row">✅ 特码 ·${final.length}：${utils.formatNumbers(final)}<div class="title-right"><button class="copy-btn" data-copy="${utils.formatNumbers(final)}" data-tip="cfTip">Copy</button><span class="datetime">${getCurrentDateTime()}</span></div></div></div>`; document.getElementById('compareResult').innerHTML=resultHtml; let note=localStorage.getItem('lottery_note'); if(note)document.getElementById('noteTextarea').value=note; if(localStorage.getItem('note_visible')==1){document.getElementById('noteSwitch').checked=true;document.getElementById('noteTextarea').style.display='block';} }
    function toggleNote(){ let ta=document.getElementById('noteTextarea'); let chk=document.getElementById('noteSwitch'); ta.style.display=chk.checked?'block':'none'; localStorage.setItem('note_visible',chk.checked?1:0); localStorage.setItem('lottery_note',ta.value); }
    function onRangeDataChange(){ storageAutoSaveRange(); refreshSelectRange(); compareAll(); }
    function storageAutoSaveRange(){ localStorage.setItem('lottery_range',document.getElementById('rangeData').value); }
    function autoCalc(num){ let numbers=utils.parseNumbers(document.getElementById(`numInput${num}`).value); let countMap={}; for(let i=1;i<=49;i++)countMap[i]=0; numbers.forEach(n=>countMap[n]++); state.countData[num]=countMap; let values=Object.values(countMap).filter(v=>v>0); state.minMax[num].max=values.length?Math.max(...values):0; let maxCount=state.minMax[num].max; let groupMap={}; for(let c=0;c<=maxCount;c++)groupMap[c]=[]; for(let i=1;i<=49;i++)groupMap[countMap[i]].push(i); let sortedCounts=Array.from({length:maxCount+1},(_,i)=>i).filter(c=>groupMap[c].length>0); let container=document.getElementById(`groupResult${num}`); if(container){ let html='<div class="stat-content">'; sortedCounts.forEach(c=>{ if(groupMap[c].length) html+=`<div class="group-item">${c}次 - ${groupMap[c].join(',')}</div>`; }); html+='</div>'; container.innerHTML=html; } document.getElementById(`inputInfo${num}`).innerHTML=`已输入：${numbers.length} 个`; storageAutoSaveInput(); compareAll(); }
    function storageAutoSaveInput(){ localStorage.setItem('lottery_input1',document.getElementById('numInput1').value); localStorage.setItem('lottery_input2',document.getElementById('numInput2').value); }
    function copyBothData(){ copyToClipboard(`G · A\n${document.getElementById('numInput1').value}\n...........\nG · B\n${document.getElementById('numInput2').value}`,'inputTip2'); }
    function clearBoth(){ [1,2].forEach(n=>{document.getElementById(`numInput${n}`).value='';autoCalc(n);}); compareAll(); }
    function importTxtToBoth(){ document.getElementById('importFileInput').click(); }
    function handleFileSelect(e){ let file=e.target.files[0]; if(!file)return; let reader=new FileReader(); reader.onload=ev=>{ let content=ev.target.result; let parts=content.split(/\.{6,}/); if(parts.length<2)return; document.getElementById('numInput1').value=parts[0].trim(); document.getElementById('numInput2').value=parts[1].trim(); autoCalc(1); autoCalc(2); }; reader.readAsText(file); }
    function toggleGlobalStat(){ let chk=document.getElementById('globalStatSwitch'); document.querySelectorAll('.stat-content').forEach(el=>el.style.display=chk.checked?'block':'none'); localStorage.setItem('globalStatVisible',chk.checked?1:0); }
    function toggleMatchPanel(){ let sw=document.getElementById('matchSwitch'); if(sw.checked&&!localStorage.getItem(STORAGE_KEY)){ showToast('请先授权'); sw.checked=false; return; } document.getElementById('rulePanelWrap').style.display=sw.checked?'block':'none'; }
    function toggleRangePanel(){ let sw=document.getElementById('rangeSwitch'); if(sw.checked&&!localStorage.getItem(STORAGE_KEY)){ showToast('请先授权'); sw.checked=false; return; } document.getElementById('rangePanelWrap').style.display=sw.checked?'block':'none'; }
    function toggleSelectRangePanel(){ let sw=document.getElementById('selectRangeSwitch'); if(sw.checked&&!localStorage.getItem(STORAGE_KEY)){ showToast('请先授权'); sw.checked=false; return; } document.getElementById('selectRangePanelWrap').style.display=sw.checked?'block':'none'; if(sw.checked) refreshSelectRange(); }
    // 同步模块
    const DATA_API_URL='https://mayipan.eu.cc/gab_summary.html', RANGE_API_URL='https://mayipan.eu.cc/default_rules.txt';
    async function performFullSync(showMsg=false){ try{ let resp=await fetch(DATA_API_URL+'?t='+Date.now()); let text=await resp.text(); let ga=null,gb=null; let lines=text.split(/\r?\n/); for(let i=0;i<lines.length;i++){ if(/^G[·\s\-]?A$/i.test(lines[i].trim())&&i+1<lines.length) ga=lines[i+1].trim(); if(/^G[·\s\-]?B$/i.test(lines[i].trim())&&i+1<lines.length){ gb=lines[i+1].trim(); break; } } let periodMatch=text.match(/新澳彩第:\s*(\d{7})期/); let period=periodMatch?periodMatch[0]:null; if(period)document.getElementById('periodNumber').innerText=period; if(ga&&gb){ document.getElementById('numInput1').value=ga; document.getElementById('numInput2').value=gb; autoCalc(1); autoCalc(2); if(showMsg)showToast('✅ GA/GB同步成功'); return true; } return false; }catch(e){ if(showMsg)showToast(`同步失败`); return false; } }
    async function onlineCollectRange(){ if(!localStorage.getItem(STORAGE_KEY)){ showToast('未授权'); return; } let btn=document.getElementById('onlineCollectRangeBtn'); let orig=btn.innerText; btn.innerText='⏳ 采集中...'; btn.disabled=true; try{ let resp=await fetch(RANGE_API_URL+'?t='+Date.now()); if(resp.ok){ let data=await resp.text(); document.getElementById('rangeData').value=data; onRangeDataChange(); showToast('默认规则同步成功'); } }catch(e){ showToast('采集失败'); } finally{ btn.innerText=orig; btn.disabled=false; } }
    async function manualSync(){ await requireAuthAndPerform('同步',async()=>{ await performFullSync(true); await onlineCollectRange(); }); }
    function importRulesFromRange(){ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let text=document.getElementById('rangeData').value; let lines=text.split(/\r?\n/); lines.forEach(line=>{ let parsed=parseRuleLine(line); if(parsed&&parsed.a&&parsed.b)fillRuleToSlots(parsed.a,parsed.b); }); }
    function importCustomRuleByText(){ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let txt=document.getElementById('ruleImportText').value; txt.split(/[\r\n]+/).forEach(line=>{ let p=parseRuleLine(line); if(p&&p.a&&p.b)fillRuleToSlots(p.a,p.b); }); }
    function clearRuleImportInput(){ document.getElementById('ruleImportText').value=''; localStorage.removeItem('rule_import_text'); }
    function importRuleFromTxt(){ document.getElementById('importRuleFileInput').click(); }
    function handleRuleFileSelect(e){ let file=e.target.files[0]; if(!file)return; let reader=new FileReader(); reader.onload=ev=>{ document.getElementById('ruleImportText').value=ev.target.result; importCustomRuleByText(); }; reader.readAsText(file); }
    function autoSaveRuleImportText(){ localStorage.setItem('rule_import_text',document.getElementById('ruleImportText').value); }
    // 笛卡尔积简单存根保持功能不报错
    function refreshSelectRange(){ try{ let rulesText=document.getElementById('rangeData').value; let rules=[]; rulesText.split(/\r?\n/).forEach(l=>{ let p=parseRuleLine(l); if(p&&p.a&&p.b)rules.push(p); }); let period=parseInt(document.getElementById('selectPeriodInput').value)||rules.length; let slice=rules.slice(-period); let stats=new Map(); slice.forEach(({a,b})=>{ if(!stats.has(a))stats.set(a,new Map()); let m=stats.get(a); m.set(b,(m.get(b)||0)+1); }); let hot=[],warm=[],cold=[]; for(let[a,bMap]of stats){ let max=0,hotB=null; for(let[b,cnt]of bMap)if(cnt>max){max=cnt;hotB=b;} if(hotB)hot.push(`${a}→${hotB}`); for(let[b,cnt]of bMap)if(cnt>=2&&b!==hotB)warm.push(`${a}→${b}`); } let coldArr=[]; for(let[a,bMap]of stats){ let used=new Set([...hot.filter(h=>h.startsWith(`${a}→`)).map(h=>h.split('→')[1]),...warm.filter(w=>w.startsWith(`${a}→`)).map(w=>w.split('→')[1])]); let coldB=Array.from(bMap.keys()).filter(b=>!used.has(b.toString())).sort((x,y)=>x-y); if(coldB.length) coldArr.push(`${a}→${coldB.join(',')}`); } let html=[...hot.map(h=>`<span class="ab-line rule-hot">${h}</span>`),...warm.map(w=>`<span class="ab-line rule-warm">${w}</span>`),...coldArr.map(c=>`<span class="ab-line rule-cold">${c}</span>`)].join(''); document.getElementById('selectRulesDetail').innerHTML=html||'无规则'; let count=hot.length+warm.length+coldArr.length; document.getElementById('selectRuleGridCount').innerHTML=`${count}格`; }catch(e){ console.error(e); } }
    function openVip(){ if(!localStorage.getItem(STORAGE_KEY)){ showToast('授权后使用'); return; } window.open('https://t.me/mayiya_bot'); }
    function openPm(){ if(!localStorage.getItem(STORAGE_KEY)){ showToast('授权后使用'); return; } window.open('https://t.me/mayi2036'); }
    function initApp(){ let saved=localStorage.getItem('lottery_input1'); if(saved)document.getElementById('numInput1').value=saved; let saved2=localStorage.getItem('lottery_input2'); if(saved2)document.getElementById('numInput2').value=saved2; let range=localStorage.getItem('lottery_range'); if(range)document.getElementById('rangeData').value=range; autoCalc(1);autoCalc(2); compareAll(); refreshSelectRange(); document.getElementById('globalStatSwitch').checked=(localStorage.getItem('globalStatVisible')=='1'); toggleGlobalStat(); document.getElementById('autoSyncBtn').onclick=manualSync; document.getElementById('onlineCollectRangeBtn').onclick=onlineCollectRange; document.getElementById('importRulesFromRangeBtn').onclick=importRulesFromRange; document.getElementById('openVipBtn').onclick=openVip; document.getElementById('openPmBtn').onclick=openPm; document.getElementById('refreshSelectRulesBtn').onclick=refreshSelectRange; document.getElementById('importSelectHotBtn').onclick=()=>{ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let spans=document.querySelectorAll('#selectRulesDetail .rule-hot'); spans.forEach(sp=>{ let txt=sp.innerText; let[a,b]=txt.split('→'); if(a&&b)fillRuleToSlots(a,b); }); }; document.getElementById('importSelectWarmBtn').onclick=()=>{ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let spans=document.querySelectorAll('#selectRulesDetail .rule-warm'); spans.forEach(sp=>{ let[a,b]=sp.innerText.split('→'); if(a&&b)fillRuleToSlots(a,b); }); }; document.getElementById('importSelectColdBtn').onclick=()=>{ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let spans=document.querySelectorAll('#selectRulesDetail .rule-cold'); spans.forEach(sp=>{ let txt=sp.innerText; let[a,b]=txt.split('→'); if(a&&b)fillRuleToSlots(a,b); }); }; document.getElementById('coldModeSelect').onchange=refreshSelectRange; let ant=document.getElementById('antIcon'); if(ant) ant.onclick=()=>{ if(localStorage.getItem(STORAGE_KEY))manualSync(); else showToast('请先授权'); }; document.getElementById('addCustomRuleBtn').onclick=()=>{ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let cont=document.getElementById('ruleInputsContainer'); cont.style.display=cont.style.display==='none'?'block':'none'; showRulesDetail=!showRulesDetail; }; loadMarqueeText(); }
    // 授权卡片验证逻辑
    window.onload = async () => {
        let authCardDeviceCode=document.getElementById('authCardDeviceCode'); authCardDeviceCode.innerText=getDeviceUUID(); authCardDeviceCode.onclick=()=>copyToClipboard(getDeviceUUID(),'authCardTip');
        let savedAuth=localStorage.getItem(STORAGE_KEY); let authValid=false;
        if(savedAuth){ let valid=await verifyAuthWithWorker(savedAuth); if(valid){ authValid=true; document.getElementById('authCardTip').textContent='✅ 已授权'; document.getElementById('authCardTip').style.color='#6cce6c'; document.getElementById('authCardCode').value=savedAuth; setCardSwitchesEnabled(true); }else{ clearAuth(); setCardSwitchesEnabled(false); document.getElementById('authCardTip').textContent='授权失效'; } } else setCardSwitchesEnabled(false);
        document.getElementById('authCardVerifyBtn').onclick=async()=>{ let code=document.getElementById('authCardCode').value.trim(); if(!code){ document.getElementById('authCardTip').textContent='输入授权码'; return; } document.getElementById('authCardTip').textContent='验证中...'; let ok=await verifyAuthWithWorker(code); if(ok){ saveAuthCode(code); setCardSwitchesEnabled(true); document.getElementById('authCardTip').textContent='✅ 授权成功'; document.getElementById('authCardTip').style.color='#6cce6c'; if(window.refreshSelectRange)refreshSelectRange(); compareAll(); }else{ clearAuth(); setCardSwitchesEnabled(false); document.getElementById('authCardTip').textContent='❌ 无效授权码'; } };
        initApp();
    };
    window.copyBothData=copyBothData; window.clearBoth=clearBoth; window.importTxtToBoth=importTxtToBoth; window.autoCalc=autoCalc; window.toggleGlobalStat=toggleGlobalStat; window.toggleMatchPanel=toggleMatchPanel; window.toggleRangePanel=toggleRangePanel; window.toggleSelectRangePanel=toggleSelectRangePanel; window.onRuleChange=onRuleChange; window.resetRules=resetRules; window.clearAllRules=clearAllRules; window.importCustomRuleByText=importCustomRuleByText; window.clearRuleImportInput=clearRuleImportInput; window.importRuleFromTxt=importRuleFromTxt; window.deleteCustomRule=deleteCustomRule; window.updateCustomRule=updateCustomRule; window.autoSaveRuleImportText=autoSaveRuleImportText; window.onRangeDataChange=onRangeDataChange; window.refreshSelectRange=refreshSelectRange; window.editRule=(type,a,b,idx)=>{ if(!localStorage.getItem(STORAGE_KEY)){showToast('请先授权');return;} let newVal=prompt('编辑规则',`${a}→${b}`); if(newVal){ let p=parseRuleLine(newVal); if(p&&p.a&&p.b){ /*模拟编辑*/ showToast('演示模式: 规则已更新'); refreshSelectRange(); } } };
    window.rangeToNumbers=rangeToNumbers; window.showToast=showToast; window.copyToClipboard=copyToClipboard;
</script>
