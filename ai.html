<script>
// ======================= 授权系统 =======================
const SECRET_SALT = "ANT2026_ZODIAC";
const STORAGE_AUTH = "ANT_AUTH_V2";
const STORAGE_TRIAL = "ANT_TRIAL_START";

function getDeviceCode() {
    try {
        let code = localStorage.getItem("device_code");
        if (!code) {
            const temp = [navigator.userAgent, screen.width, screen.height, navigator.language].join("|");
            let hash = 0;
            for (let i = 0; i < temp.length; i++) {
                hash = ((hash << 5) - hash) + temp.charCodeAt(i);
                hash = hash & hash;
            }
            code = Math.abs(hash).toString(16).toUpperCase();
            localStorage.setItem("device_code", code);
        }
        return code;
    } catch(e) { return "UNKNOWN_DEVICE"; }
}

function generateAuthCode(device, days) {
    const expireTime = (days === 0) ? 0 : Date.now() + days * 86400000;
    let raw = device + SECRET_SALT + expireTime;
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
        hash = ((hash << 5) - hash) + raw.charCodeAt(i);
        hash = hash & hash;
    }
    const cs = Math.abs(hash).toString(16).slice(0,8).toUpperCase();
    return `${expireTime}_${cs}`;
}

function validateAuth(device, authCode) {
    try {
        const parts = authCode.split("_");
        if (parts.length !== 2) return false;
        const expireTime = Number(parts[0]);
        const sign = parts[1];
        let raw = device + SECRET_SALT + expireTime;
        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
            hash = ((hash << 5) - hash) + raw.charCodeAt(i);
            hash = hash & hash;
        }
        const cs = Math.abs(hash).toString(16).slice(0,8).toUpperCase();
        if (cs !== sign) return false;
        if (expireTime === 0) return true;
        if (expireTime < Date.now()) return false;
        return true;
    } catch(e) { return false; }
}

// 检查授权状态（返回是否可用）
function isAuthorized() {
    const device = getDeviceCode();
    // 检查授权码
    const storedAuth = localStorage.getItem(STORAGE_AUTH);
    if (storedAuth && validateAuth(device, storedAuth)) {
        return true;
    }
    // 检查试用期
    const trialStart = localStorage.getItem(STORAGE_TRIAL);
    if (trialStart) {
        const start = parseInt(trialStart);
        const expireMs = start + 1 * 86400000;
        if (Date.now() < expireMs) {
            return true;
        }
    }
    return false;
}

// 获取状态详情（用于显示）
function getAuthStatusDetail() {
    const device = getDeviceCode();
    const storedAuth = localStorage.getItem(STORAGE_AUTH);
    if (storedAuth && validateAuth(device, storedAuth)) {
        const parts = storedAuth.split("_");
        const expireTime = Number(parts[0]);
        if (expireTime === 0) return { valid: true, msg: "✅ 永久授权", canTrial: false };
        const remain = Math.ceil((expireTime - Date.now()) / 86400000);
        if (remain > 0) return { valid: true, msg: `✅ 授权有效，剩余 ${remain} 天`, canTrial: false };
    }
    const trialStart = localStorage.getItem(STORAGE_TRIAL);
    if (trialStart) {
        const start = parseInt(trialStart);
        const expireMs = start + 1 * 86400000;
        const remain = Math.ceil((expireMs - Date.now()) / 86400000);
        if (remain > 0) {
            return { valid: true, msg: `🎁 试用期剩余 ${remain} 天`, canTrial: false };
        }
    }
    return { valid: false, msg: "❌ 未授权，请验证或试用", canTrial: true };
}

function useTrial() {
    localStorage.setItem(STORAGE_TRIAL, Date.now().toString());
    localStorage.removeItem(STORAGE_AUTH);
    updateAuthUI();
}

function checkAuth() {
    const device = getDeviceCode();
    const authInput = document.getElementById("authCode").value.trim();

async function copyToClipboard(text, tipId) {
    if (!text || text.trim() === '') {
        if (tipId) {
            const tipEl = document.getElementById(tipId);
            if (tipEl) tipEl.innerText = '❌ 无内容';
            setTimeout(() => { if (tipEl) tipEl.innerText = ''; }, 1500);
        }
        return false;
    }
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    let success = false;
    try {
        success = document.execCommand('copy');
    } catch (e) {
        console.error('复制失败', e);
    }
    document.body.removeChild(textarea);
    if (tipId) {
        const tipEl = document.getElementById(tipId);
        if (tipEl) {
            tipEl.innerText = success ? '✅已Copy' : '❌Copy失败';
            setTimeout(() => tipEl.innerText = '', 1500);
        }
    }
    return success;
}

function rangeToNumbers(r) { 
    r = r.trim(); 
    if (!r || r === '-') return [];
    let normalized = r.replace(/[～~－]/g, '-');
    let m = normalized.match(/^(\d+)-(\d+)$/); 
    if (m) { 
        let s = parseInt(m[1]), e = parseInt(m[2]); 
        if (!isNaN(s) && !isNaN(e) && s <= e && s >= 0 && e <= 49) { 
            let arr = []; 
            for (let i = s; i <= e; i++) arr.push(i); 
            return arr; 
        } 
    } 
    let n = parseInt(r); 
    return isNaN(n) ? [] : [n]; 
}

function parseRuleLine(line) { 
    line = line.trim(); 
    if (!line) return null; 
    let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/); 
    if (arrow) { 
        let a = arrow[1].trim(), b = arrow[2].trim(); 
        if (a && b) return { a: a, b: b };
    } 
    let parts = line.split(/\s+/); 
    if (parts.length >= 2) return { a: parts[0], b: parts[1] }; 
    return null; 
}

function getAllRuleSet() { let set = new Set(); for (let i = 1; i <= 5; i++) { let a = document.getElementById(`rule${i}a`).value.trim(); let b = document.getElementById(`rule${i}b`).value.trim(); if (a && b) set.add(`${a}|${b}`); } for (let r of state.customRules) if (r.a && r.b) set.add(`${r.a}|${r.b}`); return set; }

function fillRuleToSlots(aVal, bVal) { 
    let key = `${aVal}|${bVal}`; 
    if (getAllRuleSet().has(key)) return false; 
    for (let i = 1; i <= 5; i++) { 
        let aEl = document.getElementById(`rule${i}a`); 
        let bEl = document.getElementById(`rule${i}b`); 
        if (aEl && bEl && (!aEl.value.trim() || !bEl.value.trim())) { 
            aEl.value = aVal; 
            bEl.value = bVal;
            onRuleChange(); 
            return true; 
        } 
    } 
    state.customRules.push({ a: aVal, b: bVal }); 
    renderCustomRules(); 
    onRuleChange(); 
    return true; 
}

function openCustomRulePanel() { let chk = document.getElementById('matchSwitch'); if (!chk.checked) { chk.checked = true; toggleMatchPanel(); } }

        } 
    }

}

        } 
    } 
}

function ruleContains(ruleVal, val) { return rangeToNumbers(ruleVal).includes(val); }
function matchRule(val, rule) { rule = (rule || '').trim().replace(/~/g,'-').replace(/～/g,'-'); if (!rule) return true; if (rule.includes('-')) { let [a,b] = rule.split('-').map(Number); return val >= Math.min(a,b) && val <= Math.max(a,b); } return val == Number(rule); }
function getDynamicDefaults() { let m1 = state.minMax[1].max||0, m2 = state.minMax[2].max||0; return [{a:'0-2',b:'0-2'},{a:'2-2',b:'1-4'},{a:'3-5',b:'2-6'},{a:'6-6',b:'2-6'},{a:`7-${m1}`,b:`3-${m2}`}]; }

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
function clearAllRules() { for (let i=1;i<=5;i++) { document.getElementById(`rule${i}a`).value = ''; document.getElementById(`rule${i}b`).value = ''; } state.customRules = []; renderCustomRules(); compareAll(); }

function compareAll() {
    const rules = [
        { a: document.getElementById('rule1a').value.trim(), b: document.getElementById('rule1b').value.trim() },
        { a: document.getElementById('rule2a').value.trim(), b: document.getElementById('rule2b').value.trim() },
        { a: document.getElementById('rule3a').value.trim(), b: document.getElementById('rule3b').value.trim() },
        { a: document.getElementById('rule4a').value.trim(), b: document.getElementById('rule4b').value.trim() },
        { a: document.getElementById('rule5a').value.trim(), b: document.getElementById('rule5b').value.trim() },
    ];
    const allRules = [...rules, ...state.customRules].filter(r => r.a && r.b);
    const rangeText = document.getElementById('rangeData').value.trim();
    const lines = rangeText ? rangeText.split('\n').filter(l => l.trim()) : [];
    
    let allCombosSet = new Set();
    let hitCombosSet = new Set();
    
    for (let line of lines) {
        let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/);
        let aStr = '', bStr = '';
        if (arrow) { aStr = arrow[1].trim(); bStr = arrow[2].trim(); }
        else { let parts = line.split(/\s+/); if (parts.length >= 2) { aStr = parts[0]; bStr = parts[1]; } }
        if (!aStr || !bStr) continue;
        
        let aVals = rangeToNumbers(aStr), bVals = rangeToNumbers(bStr);
        if (aVals.length === 0 || bVals.length === 0) continue;
        
        for (let a of aVals) {
            for (let b of bVals) {
                let comboKey = `${a},${b}`;
                allCombosSet.add(comboKey);
                let matched = false;
                for (let rule of allRules) {
                    if (ruleContains(rule.a, a) && ruleContains(rule.b, b)) {
                        matched = true;
                        break;
                    }
                }
                if (matched) hitCombosSet.add(comboKey);
            }
        }
    }
    
    let totalCombos = allCombosSet.size;
    let hitCombos = hitCombosSet.size;
    let overallRateHtml = totalCombos > 0 ? `<div class="hit-rate-display" style="margin-bottom:8px;">组合命中率：${hitCombos} / ${totalCombos} = ${((hitCombos / totalCombos) * 100).toFixed(2)}%</div>` : `<div class="hit-rate-display" style="margin-bottom:8px;">组合命中率：0 / 0 = 0.00%</div>`;
    
    const c1 = state.countData[1], c2 = state.countData[2];
    if (!c1 || !c2) { document.getElementById('compareResult').innerHTML = overallRateHtml; document.getElementById('compareResult').style.display = 'block'; return; }
    
    const allNumbers = Array.from({ length: 49 }, (_, i) => i + 1);
    const results = [], texts = [];
    allRules.forEach(r => {
        const resSet = new Set();
        for (let n of allNumbers) if (matchRule(c1[n], r.a) && matchRule(c2[n], r.b)) resSet.add(n);
        results.push(Array.from(resSet).sort((a,b)=>a-b));
        texts.push(`${r.a} → ${r.b}`);
    });
    
    const finalSet = new Set();
    results.forEach(res => res.forEach(n => finalSet.add(n)));
    const final = Array.from(finalSet).sort((a,b)=>a-b);
    const totalStat = getTotalZodiacStat();
    let totalHtml = `<div class="total-zodiac-title">📊 生肖冷热门</div><div class="total-zodiac-list">`;
    totalStat.forEach(([z,n]) => { totalHtml += `<span class="zodiac-item" onclick="zodiacUI.showTotalZodiacNum('${z}')">${z} ${n}</span>`; });
    totalHtml += `</div><div class="zodiac-show-num" id="totalZodiacShowNum" style="display:none;margin-top:6px;"></div>`;
    let resHtml = ''; texts.forEach((text,i) => { resHtml += `<div class="group-item compare-row">【${text} · ${results[i].length}】：${utils.formatNumbers(results[i])}</div>`; });
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} 周${['日','一','二','三','四','五','六'][now.getDay()]}`;
    const finalHtml = `<div class="result-title"><span>🔵 统计结果 &nbsp; ${dateStr}</span><label class="switch-control">Memo book<input type="checkbox" id="noteSwitch" onchange="toggleNote()"></label></div><textarea id="noteTextarea" class="note-textarea" placeholder="本澳彩盘口统计系统由蚂蚁数据团队研发，欢迎使用！" oninput="storage.autoSaveNote()"></textarea>${resHtml}${overallRateHtml}<div class="group-item final-row">✅ 特 ·${final.length}：${utils.formatNumbers(final)}</div><div class="title-right"><button class="copy-btn" data-copy="${utils.formatNumbers(final)}" data-tip="cfTip">Copy</button><span id="cfTip" class="copy-tip"></span></div><div class="query-zodiac-input"><input id="queryZodiacInput" oninput="zodiacUI.queryZodiac()" placeholder="输入数字查生肖"></div><div class="query-zodiac-result" id="queryZodiacResult"></div><div class="total-zodiac-stat">${totalHtml}</div>`;
    document.getElementById('compareResult').innerHTML = finalHtml;
    ui.bindCopyButtons(); storage.loadNote(); keepNoteState();
}

function renderBase(num,total,unique,maxCount) { let container = document.getElementById(`baseResult${num}`); if (!container) return; container.innerHTML = `<div class="result-title">📊 盘口频次</div><div class="stat-content"><div class="base-row"><div>加密数据：${total}</div><div>高频：${maxCount}次(热)</div><div>低频：0次(冷)</div></div></div>`; let chk = document.getElementById('globalStatSwitch'); let cd = container.querySelector('.stat-content'); if (cd) cd.style.display = (chk && chk.checked) ? 'block' : 'none'; }
function renderGroup(num,sortedCounts,groupMap,maxCount) { let html = `<div class="result-title"></div><div class="stat-content">`; sortedCounts.forEach(c=>{ let nums = groupMap[c].join(','); if (nums) html+=`<div class="group-item">${c}次 - ${nums}</div>`; }); let copyText = sortedCounts.map(c=>{ let nums = groupMap[c].join(','); return nums ? `${c}次 - ${nums}` : ''; }).filter(Boolean).join('\n'); state.groupLines[num]=copyText; html+=`<div class="title-right"><button class="copy-btn" data-copy="${copyText}" data-tip="gTip${num}">Copy All</button><span id="gTip${num}" class="copy-tip"></span></div></div>`; document.getElementById(`groupResult${num}`).innerHTML = html; ui.bindCopyButtons(); let chk = document.getElementById('globalStatSwitch'); let cd = document.querySelector(`#groupResult${num} .stat-content`); if (cd) cd.style.display = (chk && chk.checked) ? 'block' : 'none'; }
function calculate(num) { let numbers = utils.parseNumbers(document.getElementById(`numInput${num}`).value); if (numbers.length === 0) { state.countData[num] = {}; state.minMax[num] = {min:0,max:0}; document.getElementById(`baseResult${num}`).innerHTML = ''; document.getElementById(`groupResult${num}`).innerHTML = ''; return; } let countMap = {}; for (let i=1;i<=49;i++) countMap[i]=0; numbers.forEach(n=>countMap[n]++); state.countData[num]=countMap; let values = Object.values(countMap).filter(v=>v>0); state.minMax[num].max = values.length ? Math.max(...values) : 0; let maxCount = state.minMax[num].max; let groupMap = {}; for (let c=0;c<=maxCount;c++) groupMap[c]=[]; for (let i=1;i<=49;i++) { let c = countMap[i]; groupMap[c].push(i); } let sortedCounts = Array.from({length:maxCount+1},(_,i)=>i).filter(c=>groupMap[c].length>0); renderBase(num,numbers.length,new Set(numbers).size,maxCount); renderGroup(num,sortedCounts,groupMap,maxCount); }
function autoCalc(num) { ui.updateInputInfo(num); calculate(num); storage.autoSaveInput(); clearTimeout(state.timers.autoCompare); state.timers.autoCompare = setTimeout(compareAll, 260); }
function bindPaste() { [1,2].forEach(n=>{ document.getElementById(`numInput${n}`).addEventListener('paste',e=>{ e.preventDefault(); let text = (e.clipboardData||window.clipboardData).getData('text'); let nums = utils.parseNumbers(text); let el = document.getElementById(`numInput${n}`); let start = el.selectionStart; el.value = el.value.substring(0,start) + nums.join(' ') + el.value.substring(start); autoCalc(n); }); }); }
function clearRuleImportInput() { document.getElementById('ruleImportText').value = ''; storage.clearRuleImportText(); }
function importRuleFromTxt() { openCustomRulePanel(); document.getElementById('importRuleFileInput').click(); }
function handleRuleFileSelect(e) { let file = e.target.files[0]; if (!file) return; let reader = new FileReader(); reader.onload = function(ev) { document.getElementById('ruleImportText').value = ev.target.result; storage.saveRuleImportText(); importCustomRuleByText(); }; reader.readAsText(file, "UTF-8"); e.target.value = ''; }
function importTxtToBoth() { document.getElementById('importFileInput').click(); }
function handleFileSelect(e) { let file = e.target.files[0]; if (!file) return; let reader = new FileReader(); reader.onload = function(ev) { let content = ev.target.result; let parts = content.split(/\.{6,}/); if (parts.length < 2) { alert("文件格式错误：未找到分隔符 '........'，请确保上半部分为G·A数据，下半部分为G·B数据，中间用........隔开。"); return; } let ga = parts[0].trim(); let gb = parts[1].trim(); if (parts.length > 2) gb = parts.slice(1).join(' ').trim(); document.getElementById('numInput1').value = ga; document.getElementById('numInput2').value = gb; autoCalc(1); autoCalc(2); storage.saveInput(); }; reader.readAsText(file, "UTF-8"); e.target.value = ''; }
